<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1a2e">
<title>Clawd 桌宠</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{width:100vw;height:100vh;height:100dvh;overflow:hidden;font-family:'Courier New',monospace;touch-action:none;user-select:none;-webkit-user-select:none}
#bg{position:fixed;inset:0;z-index:0;transition:background 2s ease}
.bg-day{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%)}
.bg-sunset{background:linear-gradient(135deg,#f093fb 0%,#f5576c 50%,#4facfe 100%)}
.bg-night{background:linear-gradient(135deg,#0c0c1d 0%,#1a1a2e 50%,#16213e 100%)}
#stars{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:0;transition:opacity 2s}
#stars.show{opacity:1}
.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle var(--dur) ease-in-out infinite alternate}
@keyframes twinkle{from{opacity:.2;transform:scale(.8)}to{opacity:1;transform:scale(1.2)}}
#pet{position:fixed;z-index:100;cursor:grab;touch-action:none;transition:filter .3s}
#pet:active{cursor:grabbing}
#pet.sleeping{filter:brightness(.7) saturate(.8)}
#pet-img{width:120px;height:120px;image-rendering:pixelated;image-rendering:crisp-edges;pointer-events:none;filter:drop-shadow(0 4px 12px rgba(0,0,0,.4));transition:transform .3s}
#pet.happy #pet-img{transform:scale(1.1)}
#pet.error #pet-img{animation:shake .5s ease-in-out}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px) rotate(-3deg)}50%{transform:translateX(8px) rotate(3deg)}75%{transform:translateX(-4px) rotate(-1deg)}}
#pet.bounce #pet-img{animation:bounce 2s ease-in-out infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
#bubble{position:absolute;bottom:110%;left:50%;transform:translateX(-50%) scale(0);background:rgba(255,255,255,.95);color:#333;padding:8px 14px;border-radius:16px;font-size:13px;white-space:nowrap;box-shadow:0 2px 12px rgba(0,0,0,.15);transition:transform .3s cubic-bezier(.34,1.56,.64,1);pointer-events:none;max-width:200px;text-align:center;z-index:10}
#bubble::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:8px solid transparent;border-top-color:rgba(255,255,255,.95)}
#bubble.show{transform:translateX(-50%) scale(1)}
#slbl{position:absolute;top:100%;left:50%;transform:translateX(-50%);margin-top:6px;font-size:11px;color:rgba(255,255,255,.8);text-shadow:0 1px 3px rgba(0,0,0,.5);white-space:nowrap;pointer-events:none}
#panel{position:fixed;bottom:0;left:0;right:0;z-index:200;background:rgba(0,0,0,.7);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,.1);padding:12px 8px;padding-bottom:max(12px,env(safe-area-inset-bottom));transform:translateY(calc(100% - 50px));transition:transform .4s cubic-bezier(.34,1.56,.64,1)}
#panel.open{transform:translateY(0)}
#ptog{display:flex;align-items:center;justify-content:center;gap:8px;color:rgba(255,255,255,.7);font-size:13px;padding:4px 0 10px;cursor:pointer}
#ptog .arw{transition:transform .3s;font-size:16px}
#panel.open #ptog .arw{transform:rotate(180deg)}
.brow{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;padding:0 4px}
.btn{padding:8px 14px;border:1px solid rgba(255,255,255,.2);border-radius:20px;background:rgba(255,255,255,.08);color:rgba(255,255,255,.85);font-size:12px;font-family:inherit;cursor:pointer;transition:all .2s;white-space:nowrap}
.btn:active,.btn.active{background:rgba(255,255,255,.25);border-color:rgba(255,255,255,.5);transform:scale(.95)}
.btn.active{box-shadow:0 0 12px rgba(255,255,255,.2)}
.srow{display:flex;align-items:center;justify-content:center;gap:12px;margin-top:10px}
.sbtn{width:36px;height:36px;border-radius:50%;border:1px solid rgba(255,255,255,.3);background:rgba(255,255,255,.1);color:#fff;font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.sbtn:active{background:rgba(255,255,255,.3)}
#slbl2{color:rgba(255,255,255,.6);font-size:12px;min-width:40px;text-align:center}
.particle{position:fixed;pointer-events:none;z-index:99;font-size:20px;animation:float-up 1.5s ease-out forwards}
@keyframes float-up{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-80px) scale(.5)}}
.ripple{position:fixed;width:60px;height:60px;border-radius:50%;background:rgba(255,255,255,.2);transform:translate(-50%,-50%) scale(0);animation:rp .6s ease-out forwards;pointer-events:none;z-index:98}
@keyframes rp{to{transform:translate(-50%,-50%) scale(3);opacity:0}}
.zzz{position:absolute;font-size:16px;color:rgba(255,255,255,.7);pointer-events:none;animation:zf 2s ease-out forwards}
@keyframes zf{0%{opacity:1;transform:translate(0,0) scale(.5)}100%{opacity:0;transform:translate(30px,-60px) scale(1.5)}}
.credits{position:fixed;top:8px;right:12px;z-index:300;font-size:10px;color:rgba(255,255,255,.35);text-align:right}
.credits a{color:rgba(255,255,255,.5)}
</style>
</head>

<div class="credits">Clawd on Desk<br><a href="https://github.com/rullerzhou-afk/clawd-on-desk" target="_blank">GitHub</a></div>

</div>

    <div class="sbtn" id="sdn">−</div>

  </div>
</div>

const STATES={
  idle:{label:'🦀 闲逛中',emoji:'🦀',bubbles:['...','嗯...','(发呆)','☀️']},
  thinking:{label:'🤔 思考中',emoji:'🤔',bubbles:['让我想想...','嗯...','这样啊','有了!']},
  typing:{label:'⌨️ 打字中',emoji:'⌨️',bubbles:['哒哒哒...','啪啪啪','写代码中~','🔧']},
  happy:{label:'🎉 开心!',emoji:'🎉',bubbles:['耶!','太棒了!','嘿嘿~','✨']},
  sleeping:{label:'😴 睡觉中',emoji:'😴',bubbles:['Zzz...','💤','(安详)','好困...']},
  error:{label:'💥 出错了',emoji:'💥',bubbles:['啊这...','出bug了!','呜呜','💀']},
  sweeping:{label:'🧹 扫地中',emoji:'🧹',bubbles:['刷刷刷~','干净了!','打扫中~','✨']},
  juggling:{label:'🤹 杂耍中',emoji:'🤹',bubbles:['看好了!','厉害吧~','哇哦','🎪']},
};
const S=Object.keys(STATES);let cs='idle',sz=120,po=false,bt=null,at=null,zt=null;
const bg=document.getElementById('bg'),stars=document.getElementById('stars'),w=document.getElementById('pet'),pi=document.getElementById('pet-img'),bu=document.getElementById('bubble'),sl=document.getElementById('slbl'),pa=document.getElementById('panel'),sb=document.getElementById('sbtns'),sl2=document.getElementById('slbl2');
// Stars
(function(){for(let i=0;i<50;i++){const s=document.createElement('div');s.className='star';const z=Math.random()*3+1;s.cssText=`width:${z}px;height:${z}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--dur:${Math.random()*3+2}s;animation-delay:${Math.random()*3}s`;stars.appendChild(s)}})();
// BG
function ubg(){const h=new Date().getHours();bg.className=h>=6&&h<17?'bg-day':h>=17&&h<20?'bg-sunset':'bg-night';stars.classList.toggle('show',h>=20||h<6)}ubg();setInterval(ubg,60000);
// State
function ss(k,b=true){if(!GIF_DATA[k])return;cs=k;const st=STATES[k];pi.src='data:image/gif;base64,'+GIF_DATA[k];sl.textContent=st.label;w.className='';if(k==='idle'||k==='sweeping')w.classList.add('bounce');if(k==='sleeping')w.classList.add('sleeping');if(k==='happy')w.classList.add('happy');if(k==='error')w.classList.add('error');clearInterval(zt);if(k==='sleeping')zt=setInterval(sz,2000);if(b)srb(k);ub()}
function srb(k){const st=STATES[k];if(!st)return;bu.textContent=st.bubbles[Math.floor(Math.random()*st.bubbles.length)];bu.classList.add('show');clearTimeout(bt);bt=setTimeout(()=>bu.classList.remove('show'),2500)}
function sz(){const z=document.createElement('div');z.className='zzz';z.textContent='Z';z.style.left=(w.offsetLeft+sz-10)+'px';z.style.top=(w.offsetTop+10)+'px';z.style.fontSize=(14+Math.random()*10)+'px';document.body.appendChild(z);setTimeout(()=>z.remove(),2000)}
const idleS=['idle','sweeping'],actS=['thinking','typing','juggling'],funS=['happy','error'];
function ac(){const r=Math.random();let ns;if(r<.4)ns=idleS[Math.floor(Math.random()*idleS.length)];else if(r<.75)ns=actS[Math.floor(Math.random()*actS.length)];else ns=funS[Math.floor(Math.random()*funS.length)];ss(ns);at=setTimeout(ac,5000+Math.random()*10000)}at=setTimeout(ac,8000);
// Panel
document.getElementById('ptog').onclick=()=>{po=!po;pa.classList.toggle('open',po)};
S.forEach(k=>{const b=document.createElement('div');b.className='btn';b.textContent=STATES[k].emoji+' '+k;b.dataset.state=k;b.onclick=()=>{clearTimeout(at);ss(k);at=setTimeout(ac,20000)};sb.appendChild(b)});
function ub(){document.querySelectorAll('.btn').forEach(b=>b.classList.toggle('active',b.dataset.state===cs))}
// Size
document.getElementById('sup').onclick=()=>{sz=Math.min(200,sz+20);asz()};
document.getElementById('sdn').onclick=()=>{sz=Math.max(60,sz-20);asz()};
function asz(){pi.style.width=sz+'px';pi.style.height=sz+'px';sl2.textContent=sz+'px'}
// Drag
let dg=false,dm=false,ox,oy,px=innerWidth-150,py=innerHeight-250;
w.style.left=px+'px';w.style.top=py+'px';
function pd(e){if(e.target.closest('#panel'))return;dg=true;dm=false;const t=e.touches?e.touches[0]:e;ox=t.clientX-w.offsetLeft;oy=t.clientY-w.offsetTop;w.style.transition='none'}
function pm(e){if(!dg)return;e.preventDefault();const t=e.touches?e.touches[0]:e;const x=t.clientX-ox,y=t.clientY-oy;if(Math.abs(x-px)>5||Math.abs(y-py)>5)dm=true;px=Math.max(0,Math.min(innerWidth-sz,x));py=Math.max(0,Math.min(innerHeight-sz-50,y));w.style.left=px+'px';w.style.top=py+'px'}
function pu(e){if(!dg)return;dg=false;w.style.transition='';const mid=innerWidth/2;const tx=px<mid?10:innerWidth-sz-10;w.style.left=tx+'px';px=tx;if(!dm)tap(e)}
function tap(e){const t=e.changedTouches?e.changedTouches[0]:e;const r=document.createElement('div');r.className='ripple';r.style.left=t.clientX+'px';r.style.top=t.clientY+'px';document.body.appendChild(r);setTimeout(()=>r.remove(),600);for(let i=0;i<3;i++)sp(t.clientX,t.clientY);clearTimeout(at);const all=[...idleS,...actS,...funS];let n;do{n=all[Math.floor(Math.random()*all.length)]}while(n===cs);ss(n);at=setTimeout(ac,15000)}
function sp(x,y){const em=['✨','⭐','💫','🌟','❤️','💖','🎉','🦀'];const p=document.createElement('div');p.className='particle';p.textContent=em[Math.floor(Math.random()*em.length)];p.style.left=(x+(Math.random()-.5)*40)+'px';p.style.top=(y+(Math.random()-.5)*20)+'px';document.body.appendChild(p);setTimeout(()=>p.remove(),1500)}
w.addEventListener('mousedown',pd);w.addEventListener('touchstart',pd,{passive:true});
document.addEventListener('mousemove',pm);document.addEventListener('touchmove',pm,{passive:false});
document.addEventListener('mouseup',pu);document.addEventListener('touchend',pu);
// Wake lock
let wl=null;async function rwl(){try{wl=await navigator.wakeLock.request('screen')}catch(e){}}rwl();document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible')rwl()});
// Long press = sleep
let lpt=null;w.addEventListener('touchstart',()=>{lpt=setTimeout(()=>{clearTimeout(at);ss('sleeping');bu.textContent='💤 晚安~';bu.classList.add('show');clearTimeout(bt);bt=setTimeout(()=>bu.classList.remove('show'),3000);at=setTimeout(ac,30000)},1000)},{passive:true});
w.addEventListener('touchend',()=>clearTimeout(lpt));w.addEventListener('touchmove',()=>clearTimeout(lpt));
// Double tap = happy
let lt=0;w.addEventListener('touchend',e=>{const n=Date.now();if(n-lt<300&&!dm){clearTimeout(at);ss('happy');for(let i=0;i<8;i++)setTimeout(()=>sp(px+sz/2,py),i*100);at=setTimeout(ac,15000)}lt=n});
// Init
ss('idle');ub();
document.body.addEventListener('touchmove',e=>{if(e.target.closest('#panel'))return;if(dg)e.preventDefault()},{passive:false});
