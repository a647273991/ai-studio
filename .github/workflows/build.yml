name: Build AI画室 APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle 8.11.1
      run: |
        curl -sL "https://services.gradle.org/distributions/gradle-8.11.1-bin.zip" -o /tmp/gradle.zip
        sudo unzip -q /tmp/gradle.zip -d /opt/
        sudo ln -sf /opt/gradle-8.11.1/bin/gradle /usr/local/bin/gradle
        gradle --version

    - name: Build Debug APK
      run: gradle assembleDebug --no-daemon

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: ai-studio-debug
        path: app/build/outputs/apk/debug/*.apk
